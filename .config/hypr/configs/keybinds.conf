source = ~/.config/hypr/configs/defaults.conf

#* === MAIN APPS ===
bind = $mainMod, return, exec, $terminal
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, M, exec, $music
bind = $mainMod, G, exec, $gameLauncher
bind = $mainMod, C, exec, $editor

bind = $mainMod, SPACE, exec, $appLauncher
bind = ALT, Tab, exec, snappy-switcher next
bind = ALT SHIFT, Tab, exec, snappy-switcher prev
bind = $mainMod, V, exec, vicinae vicinae://launch/clipboard/history
bind = $mainMod, BACKSPACE, exec, vicinae vicinae://launch/@sovereign/store.vicinae.awww-switcher/wpgrid
bind = $mainMod CONTROL, F, exec, vicinae vicinae://launch/files/search
bind = $mainMod, ESCAPE, exec, $powerMenu || pkill rofi #? power menu
bind = $mainMod, N, exec, /home/mizuiro/.config/rofi/waybar/waybarconf.sh || pkill rofi #? waybar switcher



#* === SCREENSHOT ===
#? (grimblast)
bind = , Print, exec, grimblast -f -n copysave output
bind = SHIFT, Print, exec, grimblast -f -n copysave area
bind = CTRL, Print, exec, grimblast -f -n copysave active

#? (hyprshot)
bind = $mainMod, Print, exec, hyprshot -m output -m active
bind = $mainMod SHIFT, Print, exec, hyprshot --mode region -z
bind = $mainMod CTRL, Print, exec, hyprshot --mode window -z


#* === RESIZING WINDOWS ===
binde = $mainMod CTRL, left, resizeactive, -40 0
binde = $mainMod CTRL, right, resizeactive, 40 0
binde = $mainMod CTRL, up, resizeactive, 0 -40
binde = $mainMod CTRL, down, resizeactive, 0 40
binde = $mainMod CTRL, h, resizeactive, -40 0
binde = $mainMod CTRL, l, resizeactive, 40 0
binde = $mainMod CTRL, k, resizeactive, 0 -40
binde = $mainMod CTRL, j, resizeactive, 0 40

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


#* === WINDOW CMMANDS ===
bind = $mainMod, W, killactive
bind = $mainMod, P, pin
bind = $mainMod SHIFT, F11, fullscreen, 1
bind = $mainMod SHIFT, F, togglefloating
bind = $mainMod, U, layoutmsg, togglesplit
bind = $mainMod SHIFT, P, pseudo
bind = $mainMod CTRL, G, togglegroup
bind = $mainMod, TAB, changegroupactive, f
bind = $mainMod SHIFT, G, moveoutofgroup
# bind = $mainMod, TAB, hyprexpo:expo, toggle #? Hyprexpo plugin
# bind = $mainMod, TAB, overview:toggle #? Hyprspace plugin

#? Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

#? Move window to location with mainMod + Shift + arrow keys
bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d
bind = $mainMod SHIFT, h, swapwindow, l
bind = $mainMod SHIFT, l, swapwindow, r
bind = $mainMod SHIFT, k, swapwindow, u
bind = $mainMod SHIFT, j, swapwindow, d


#* === WORKSPACE CMMANDS ===
bindd = $mainMod, 1, Switch to workspace 1, workspace, 1
bindd = $mainMod, 2, Switch to workspace 2, workspace, 2
bindd = $mainMod, 3, Switch to workspace 3, workspace, 3
bindd = $mainMod, 4, Switch to workspace 4, workspace, 4
bindd = $mainMod, 5, Switch to workspace 5, workspace, 5
bindd = $mainMod, 6, Switch to workspace 6, workspace, 6
bindd = $mainMod, 7, Switch to workspace 7, workspace, 7
bindd = $mainMod, 8, Switch to workspace 8, workspace, 8
bindd = $mainMod, 9, Switch to workspace 9, workspace, 9
bindd = $mainMod, 0, Switch to workspace 10, workspace, 10

#? Special Workspaces
bind = $mainMod, X, togglespecialworkspace, extra
bind = $mainMod SHIFT, X, movetoworkspace, special:extra


# ? For Scrolling Layout
bindd = $mainMod, mouse:276, side button (up), layoutmsg, focus left
bindd = $mainMod, mouse:275, side button (down), layoutmsg, focus right

#? Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, D, movetoworkspace, 10

#? Move active window to a workspace without switching (CTRL)
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10
bind = $mainMod CTRL, D, movetoworkspacesilent, 10

#? Scroll through existing workspaces using PERIOD/COMMA
bindd = $mainMod, PERIOD, Scroll through workspaces incrementally, workspace, e+1
bindd = $mainMod, COMMA, Scroll through workspaces decrementally, workspace, e-1

#? Scroll through existing workspaces using MOUSE SCROLL
bindd = $mainMod, mouse_down, Scroll through workspaces incrementally, workspace, e-1
bindd = $mainMod, mouse_up, Scroll through workspaces decrementally, workspace, e+1


#* === MISC/EXTRA ACTIONS ===
bind = $mainMod, F5, exec, hyprctl reload && hyprctl reload #? fix for broken login
bind = $mainMod, Y,exec, /home/mizuiro/.config/waybar/scripts/launch.sh #? reload waybar and swaync (for debugging)
bind = $mainMod SHIFT CONTROL, L, exec, hyprlock #? lock screen
bind = $mainMod, D, workspace, 10 #? show desktop
bind = $mainMod, DELETE, exit, #? closes hyprland
bind = $mainMod CTRL, BACKSPACE, exec, ~/.config/hypr/scripts/randowall.sh #? randomize wallpaper


#* === MEDIA KEYS ===
#? Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+ && ddcutil setvcp 10 + 5 --bus 2
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%- && ddcutil setvcp 10 - 5 --bus 2

#? Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous




